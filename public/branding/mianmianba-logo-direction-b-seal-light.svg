  </text>

  <rect x="800" y="456" width="344" height="236" rx="28" fill="#fffdf8" stroke="#e8e6dc" stroke-width="2"/>
  <text x="832" y="502" fill="#141413" font-family="Poppins, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">
