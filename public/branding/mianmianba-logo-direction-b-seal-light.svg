  </text>

  <rect x="56" y="172" width="1088" height="252" rx="32" fill="#fffdf8" stroke="#e8e6dc" stroke-width="2"/>
  <text x="88" y="218" fill="#b0aea5" font-family="Poppins, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="600">
