  </text>
  <g transform="translate(134 548)">
    <rect x="0" y="0" width="100" height="100" rx="26" fill="#fffdf8" stroke="#141413" stroke-width="6"/>
    <rect x="21" y="20" width="58" height="58" rx="14" stroke="#141413" stroke-width="9"/>
    <rect x="33" y="32" width="34" height="34" rx="8" stroke="#d97757" stroke-width="7"/>
    <path d="M14 84H84" stroke="#788c5d" stroke-width="9" stroke-linecap="round"/>
    <circle cx="85" cy="84" r="8.5" fill="#6a9bcc"/>
  </g>

  <rect x="428" y="456" width="344" height="236" rx="28" fill="#f3f0e8"/>
  <text x="460" y="502" fill="#141413" font-family="Poppins, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">
