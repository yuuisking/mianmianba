    </text>
    <rect x="0" y="130" width="280" height="8" rx="4" fill="#e8e6dc"/>
    <rect x="0" y="130" width="102" height="8" rx="4" fill="#d97757"/>
  </g>

  <rect x="56" y="456" width="344" height="236" rx="28" fill="#fffdf8" stroke="#e8e6dc" stroke-width="2"/>
  <text x="88" y="502" fill="#b0aea5" font-family="Poppins, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="600">
