  </text>

  <g transform="translate(88 252)">
    <rect x="0" y="0" width="136" height="136" rx="34" fill="#fffdf8" stroke="#141413" stroke-width="8"/>
    <rect x="28" y="26" width="80" height="80" rx="18" stroke="#141413" stroke-width="10"/>
    <rect x="44" y="42" width="48" height="48" rx="10" stroke="#d97757" stroke-width="8"/>
    <path d="M18 116H118" stroke="#788c5d" stroke-width="10" stroke-linecap="round"/>
    <circle cx="116" cy="116" r="10" fill="#6a9bcc"/>
  </g>

  <g transform="translate(264 272)">
    <text x="0" y="62" fill="#141413" font-family="Poppins, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="68" font-weight="700" letter-spacing="-1">
